name: Apply authorized repository inventory

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: authorized-inventory-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.ref == 'codex/authorized-repository-inventory'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: codex/authorized-repository-inventory
          fetch-depth: 0

      - name: Apply inventory integration
        run: |
          python3 .github/patches/authorized-inventory.py
          python3 - <<'PY'
          from pathlib import Path

          source_plan = Path("scripts/lib/authorized-source-plan.mjs")
          text = source_plan.read_text()
          old = '''  configuredSources,
            inventoryAvailable = repositoryInventory.length > 0,
            repositoryInventory = [],
            repositoryModes = {},'''
          if old not in text:
              old = '''  configuredSources,
            inventoryAvailable = repositoryInventory.length > 0,
            repositoryInventory = [],
            repositoryModes = {},'''.replace("    ", "  ")
          new = '''  configuredSources,
            repositoryInventory = [],
            inventoryAvailable = repositoryInventory.length > 0,
            repositoryModes = {},'''
          if old not in text:
              raise SystemExit("Expected generated source-plan parameters were not found.")
          source_plan.write_text(text.replace(old, new.replace("    ", "  "), 1))

          library = Path("lib/github-repository-library.ts")
          text = library.read_text()
          old = '''export class GitHubRepositoryLibraryError extends Error {
            constructor(message: string, readonly status: number) {
              super(message);
              this.name = "GitHubRepositoryLibraryError";
            }
          }'''
          old = old.replace("    ", "  ")
          new = '''export class GitHubRepositoryLibraryError extends Error {
            readonly status: number;

            constructor(message: string, status: number) {
              super(message);
              this.name = "GitHubRepositoryLibraryError";
              this.status = status;
            }
          }'''.replace("    ", "  ")
          if old not in text:
              raise SystemExit("Expected repository library error class was not found.")
          library.write_text(text.replace(old, new, 1))
          PY

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test inventory contracts
        run: |
          if ! node --experimental-strip-types --test tests/repository-inventory.test.mjs tests/github-repository-library.test.mjs tests/authorized-source-plan.test.mjs > inventory-test-failure.log 2>&1; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add inventory-test-failure.log
            git commit -m "Record inventory contract failures"
            git push origin HEAD:codex/authorized-repository-inventory
            exit 1
          fi

      - name: Build and test
        run: npm test

      - name: Commit verified integration
        run: |
          rm -rf .github/patches .github/workflows/authorized-inventory-integration.yml inventory-test-failure.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Export authorized repository inventory"
          git push origin HEAD:codex/authorized-repository-inventory
