name: Verify Baxtori

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Blacksmith currently supports organization-owned repositories only.
    # Enable this after transferring the repository and installing its GitHub App.
    if: ${{ vars.BLACKSMITH_ENABLED == 'true' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build and test
        run: npm test

  visual:
    if: ${{ vars.BLACKSMITH_ENABLED == 'true' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Exercise desktop and mobile readers
        run: npm run test:visual

      - name: Upload browser report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: baxtori-browser-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
