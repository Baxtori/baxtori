name: Verify Baxtori

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ${{ vars.BLACKSMITH_ENABLED == 'true' && 'blacksmith-2vcpu-ubuntu-2404' || 'ubuntu-24.04' }}
    timeout-minutes: 15

    steps:
      - name: Check out repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build and test
        shell: bash
        run: |
          set -o pipefail
          if ! npm test > verify-output.log 2>&1; then
            tail -n 200 verify-output.log
            exit 1
          fi
          cat verify-output.log

      - name: Upload verification failure
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: baxtori-verify-failure
          path: verify-output.log
          retention-days: 14

  visual:
    runs-on: ${{ vars.BLACKSMITH_ENABLED == 'true' && 'blacksmith-2vcpu-ubuntu-2404' || 'ubuntu-24.04' }}
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Exercise desktop and mobile readers
        run: npm run test:visual

      - name: Upload browser report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: baxtori-browser-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
