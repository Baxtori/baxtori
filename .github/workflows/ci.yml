name: Apply repository scope patch

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: apply-repository-scope-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.ref == 'codex/remove-repository-cap'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: codex/remove-repository-cap
          fetch-depth: 1

      - name: Apply staged patch
        run: |
          git apply --check .github/patches/remove-repository-cap.patch
          git apply .github/patches/remove-repository-cap.patch

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build and test
        run: npm test

      - name: Commit verified changes
        run: |
          git fetch origin main --depth=1
          git show FETCH_HEAD:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm .github/patches/remove-repository-cap.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove arbitrary repository selection cap"
          git push origin HEAD:codex/remove-repository-cap
