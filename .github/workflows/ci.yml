name: Apply repository mode persistence gate

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: repository-mode-persistence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.ref == 'codex/repository-modes'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: codex/repository-modes
          fetch-depth: 0

      - name: Apply persistence gate
        run: python3 .github/patches/repository-mode-persistence.py

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build and test
        run: npm test

      - name: Commit verified gate
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm .github/patches/repository-mode-persistence.py
          rmdir .github/patches 2>/dev/null || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/page.tsx .github/workflows/ci.yml .github/patches
          git commit -m "Protect repository choices during mode migration"
          git push origin HEAD:codex/repository-modes
