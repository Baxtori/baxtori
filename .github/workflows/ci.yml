name: Apply edition selection ledger

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: edition-selection-ledger-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.ref == 'codex/edition-selection-ledger'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: codex/edition-selection-ledger
          fetch-depth: 0

      - name: Apply reader integration
        run: python3 .github/patches/edition-selection-ledger.py

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build and test
        run: npm test

      - name: Commit verified changes
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -rf .github/patches
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/page.tsx scripts/validate-edition.mjs .github/workflows/ci.yml .github/patches
          git commit -m "Show and validate edition selection decisions"
          git push origin HEAD:codex/edition-selection-ledger
