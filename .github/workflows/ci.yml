name: Apply repository modes

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: apply-repository-modes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.ref == 'codex/repository-modes'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: codex/repository-modes
          fetch-depth: 0

      - name: Apply staged integration
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/patches/repository-modes/apply.py')
          text = path.read_text()
          text = text.replace('                   const commitCount', '                  const commitCount')
          text = text.replace('                   const mode', '                  const mode')
          text = text.replace('                   return (', '                  return (')
          path.write_text(text)
          PY
          if ! python3 .github/patches/repository-modes/apply.py > /tmp/repository-modes-apply.log 2>&1; then
            cp /tmp/repository-modes-apply.log .github/patches/repository-modes/error.txt
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add .github/patches/repository-modes/error.txt
            git commit -m "Record repository mode integration error"
            git push origin HEAD:codex/repository-modes
            cat /tmp/repository-modes-apply.log
            exit 1
          fi

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build and test
        run: npm test

      - name: Commit verified changes
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -rf .github/patches/repository-modes
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/page.tsx lib/feedback-contract.ts .github/workflows/ci.yml .github/patches/repository-modes
          git commit -m "Add explicit repository review modes"
          git push origin HEAD:codex/repository-modes
